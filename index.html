// 1. Open your Google Sheet → Extensions → Apps Script
// 2. Replace any existing code with this script
// 3. Deploy → New Deployment → Web app
//    Execute as: Me  |  Who can access: Anyone
// 4. Copy the deployment URL into the app Settings tab

function doPost(e) {
  try {
    var d = JSON.parse(e.postData.contents);
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    var log = ss.getSheetByName("COST LOG");
    if (!log) {
      log = ss.insertSheet("COST LOG");
      var h = [
        "Timestamp","Date","Week Ref",
        "Element Code","Element","BOQ Item Ref","BOQ Item Description",
        "Cost Type","Work Description",
        "Qty","Unit","Rate (₦)","Amount (₦)",
        "Recorded By","Notes","Sheets Status"
      ];
      log.appendRow(h);
      log.getRange(1,1,1,h.length)
         .setBackground("#1A3352").setFontColor("white").setFontWeight("bold");
      log.setFrozenRows(1);
      log.setColumnWidths(1,16,[140,90,80,80,140,80,280,100,250,60,60,90,110,120,200,90]);
    }
    var ts = new Date().toISOString();
    log.appendRow([
      ts, d.date, d.weekRef,
      d.elementCode, d.element, d.itemRef, d.itemDesc,
      d.costType, d.workDesc,
      Number(d.qty)||"", d.unit, Number(d.rate)||"", Number(d.amount)||0,
      d.recordedBy, d.notes||"", "PENDING"
    ]);
    SpreadsheetApp.flush();
    return ContentService
      .createTextOutput(JSON.stringify({ok:true}))
      .setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService
      .createTextOutput(JSON.stringify({ok:false,error:err.message}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}
function doGet() {
  return ContentService
    .createTextOutput(JSON.stringify({status:"Quality Cost Tracker API active — Makurai Ziko"}))
    .setMimeType(ContentService.MimeType.JSON);
}`;

// ── getWeekRef: ISO week label from date string ────────────────────────────
function getWeekRef(dateStr){
  if(!dateStr)return"";
  const d=new Date(dateStr+"T00:00:00");
  const day=d.getDay();
  const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const fmt2=dd=>`${dd.getDate().toString().padStart(2,"0")}/${(dd.getMonth()+1).toString().padStart(2,"0")}`;
  return`W${fmt2(mon)}–${fmt2(sun)}`;
}

      itemRef&&e("button",{onClick:submit,disabled:busy,style:{
        ...IS.btn(C.nav),opacity:busy?0.6:1,
        boxShadow:"0 2px 8px rgba(26,51,82,0.3)"
      }},busy?"Saving…":"Save Entry"),

      !itemRef&&e("div",{style:{textAlign:"center",padding:"24px 16px",
        color:C.tx3,fontSize:12}},
        e("div",{style:{fontSize:28,marginBottom:8}},"📋"),
        "Select an element and BOQ item above to begin recording a cost entry."
      )
    ),

    // ─── BUDGET TAB ──────────────────────────────────────────────────────────
    tab==="budget"&&e("div",{style:{padding:"12px 16px 32px"}},

      // Project total card
      e("div",{style:{...IS.card,background:`linear-gradient(135deg,${C.nav} 0%,${C.nav2} 100%)`,
        marginBottom:12,padding:"14px 16px"}},
        e("div",{style:{fontSize:9,color:"rgba(255,255,255,0.45)",letterSpacing:"0.12em",
          textTransform:"uppercase",marginBottom:6}},"Project Total — All Elements"),
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}},
          [
            ["Budget",TOTAL_BUDGET],
            ["Spent",totalSpent],
            ["Remaining",Math.max(0,TOTAL_BUDGET-totalSpent)],
          ].map(([k,v])=>e("div",{key:k},
            e("div",{style:{fontSize:9,color:"rgba(255,255,255,0.4)",marginBottom:2}},k),
            e("div",{style:{fontSize:15,fontWeight:700,
              color:k==="Spent"?C.amb:k==="Remaining"?C.grn:"#fff"}},
              "₦"+fmtShort(v))
          ))
        ),
        e("div",{style:{height:6,background:"rgba(255,255,255,0.1)",borderRadius:3,overflow:"hidden"}},
          e("div",{style:{height:"100%",
            width:Math.min(pct(totalSpent,TOTAL_BUDGET),100)+"%",
            background:pctColor(pct(totalSpent,TOTAL_BUDGET)),
            borderRadius:3,transition:"width 0.4s"}})
        ),
        e("div",{style:{marginTop:4,fontSize:10,color:"rgba(255,255,255,0.4)",textAlign:"right"}},
          pct(totalSpent,TOTAL_BUDGET).toFixed(2)+"% spent")
      ),

      // Per-element cards
      ELEMENT_KEYS.map(k=>{
        const el=BOQ[k];
        const spent=spendMap[k]?.total||0;
        const p=pct(spent,el.budget);
        const isExpanded=expandedElem===k;
        return e("div",{key:k,style:{...IS.card,padding:0,overflow:"hidden",marginBottom:8}},
          // Header row
          e("button",{onClick:()=>setExpandedElem(isExpanded?null:k),style:{
            width:"100%",background:isExpanded?C.nav:C.card,border:"none",
            padding:"10px 12px",cursor:"pointer",textAlign:"left",
            borderBottom:isExpanded?`1px solid ${C.nav2}`:"none"
          }},
            e("div",{style:{display:"flex",alignItems:"center",gap:8}},
              e("div",{style:{
                width:28,height:28,borderRadius:6,display:"flex",alignItems:"center",
                justifyContent:"center",fontSize:12,fontWeight:800,flexShrink:0,
                background:isExpanded?"rgba(255,255,255,0.1)":C.bg,
                color:isExpanded?"#fff":C.nav,border:`1px solid ${isExpanded?C.nav2:C.bdr}`
              }},el.code),
              e("div",{style:{flex:1,minWidth:0}},
                e("div",{style:{fontSize:12,fontWeight:600,
                  color:isExpanded?"#fff":C.tx,marginBottom:2}},el.label),
                e("div",{style:{height:3,background:isExpanded?"rgba(255,255,255,0.15)":C.bdr,
                  borderRadius:2,overflow:"hidden"}},
                  e("div",{style:{height:"100%",width:Math.min(p,100)+"%",
                    background:pctColor(p),borderRadius:2}})
                )
              ),
              e("div",{style:{textAlign:"right",flexShrink:0}},
                e("div",{style:{fontSize:12,fontWeight:700,
                  color:isExpanded?C.amb:pctColor(p)}},
                  "₦"+fmtShort(spent)),
                e("div",{style:{fontSize:10,
                  color:isExpanded?"rgba(255,255,255,0.45)":C.tx3}},
                  "/ ₦"+fmtShort(el.budget)),
                e("div",{style:{fontSize:9,
                  padding:"1px 5px",borderRadius:3,marginTop:2,display:"inline-block",
                  background:isExpanded?"rgba(255,255,255,0.1)":pctBg(p),
                  color:isExpanded?"rgba(255,255,255,0.7)":pctColor(p)}},
                  p.toFixed(1)+"%")
              )
            )
          ),
          // Expanded item breakdown
          isExpanded&&e("div",{style:{padding:"8px 0"}},
            el.items.map(it=>{
              const itSpent=spendMap[k]?.items[it.ref]||0;
              const itP=pct(itSpent,it.budget);
              return e("div",{key:it.ref,style:{padding:"6px 12px",
                borderBottom:`1px solid rgba(255,255,255,0.05)`}},
                e("div",{style:{display:"flex",alignItems:"center",gap:8}},
                  e("div",{style:{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.4)",
                    width:20,flexShrink:0}},it.ref),
                  e("div",{style:{flex:1,minWidth:0}},
                    e("div",{style:{fontSize:11,color:"rgba(255,255,255,0.8)",
                      whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
                      marginBottom:2}},it.desc),
                    e("div",{style:{height:2,background:"rgba(255,255,255,0.08)",borderRadius:1}},
                      itSpent>0&&e("div",{style:{height:"100%",width:Math.min(itP,100)+"%",
                        background:pctColor(itP),borderRadius:1}})
                    )
                  ),
                  e("div",{style:{textAlign:"right",flexShrink:0,minWidth:90}},
                    e("div",{style:{fontSize:11,fontWeight:600,
                      color:itSpent>0?C.amb:"rgba(255,255,255,0.25)"}},
                      itSpent>0?"₦"+fmtShort(itSpent):"—"),
                    e("div",{style:{fontSize:9,color:"rgba(255,255,255,0.3)"}},
                      "₦"+fmtShort(it.budget))
                  )
                )
              )
            })
          )
        )
      })
    ),

    // ─── LOG TAB ─────────────────────────────────────────────────────────────
    tab==="log"&&e("div",{style:{padding:"12px 16px 32px"}},

      // Filters
      e("div",{style:{display:"flex",gap:8,marginBottom:12}},
        e("select",{value:logFilter.elem,
          onChange:ev=>setLogFilter(f=>({...f,elem:ev.target.value})),
          style:{...IS.input,flex:1}},
          e("option",{value:""},"All elements"),
          ELEMENT_KEYS.map(k=>e("option",{key:k,value:k},`${BOQ[k].code} — ${BOQ[k].label}`))
        ),
        e("select",{value:logFilter.type,
          onChange:ev=>setLogFilter(f=>({...f,type:ev.target.value})),
          style:{...IS.input,flex:"0 0 110px"}},
          e("option",{value:""},"All types"),
          COST_TYPES.map(t=>e("option",{key:t,value:t},t))
        )
      ),

      // Sync bar
      entries.some(en=>en.status!=="sent")&&e("div",{style:{
        display:"flex",alignItems:"center",justifyContent:"space-between",
        background:C.wrnl,border:`1px solid #FCD34D`,borderRadius:6,
        padding:"7px 11px",marginBottom:10,fontSize:12}},
        e("span",{style:{color:C.wrn}},
          entries.filter(en=>en.status!=="sent").length+" unsynced entries"),
        e("button",{onClick:retrySync,style:{
          background:C.wrn,color:"#fff",border:"none",borderRadius:4,
          padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}},
          "Sync now")
      ),

      // Entries
      entries.length===0&&e("div",{style:{textAlign:"center",padding:"32px 0",
        color:C.tx3,fontSize:12}},
        e("div",{style:{fontSize:28,marginBottom:8}},"🗂️"),
        "No entries yet. Record your first cost entry from the Record tab."),

      entries
        .filter(en=>(!logFilter.elem||en.elemKey===logFilter.elem)&&
                    (!logFilter.type||en.costType===logFilter.type))
        .map(en=>e("div",{key:en.id,style:{...IS.card,padding:"10px 12px"}},
          e("div",{style:{display:"flex",alignItems:"flex-start",gap:8}},
            e("div",{style:{
              background:C.nav,color:"#fff",borderRadius:4,
              padding:"3px 7px",fontSize:10,fontWeight:700,flexShrink:0
            }},`${BOQ[en.elemKey]?.code||"?"}${en.itemRef}`),
            e("div",{style:{flex:1,minWidth:0}},
              e("div",{style:{fontSize:11,fontWeight:600,color:C.tx,marginBottom:1}},
                en.workDesc||en.itemDesc),
              e("div",{style:{fontSize:10,color:C.tx2,
                overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},
                en.itemDesc),
              e("div",{style:{display:"flex",flexWrap:"wrap",gap:4,marginTop:5}},
                e("span",{style:{fontSize:9,padding:"2px 6px",borderRadius:3,
                  background:en.costType==="Materials"?C.grnl:
                              en.costType==="Labour"?C.ambl:C.bg,
                  color:en.costType==="Materials"?C.grn:
                        en.costType==="Labour"?C.wrn:C.tx2,
                  fontWeight:600}},en.costType),
                e("span",{style:{fontSize:9,color:C.tx3}},en.date),
                e("span",{style:{fontSize:9,color:C.tx3}},en.weekRef),
                en.status==="sent"&&e("span",{style:{fontSize:9,color:C.grn2}},
                  "✓ Synced"),
                en.notes&&e("span",{style:{fontSize:9,color:C.tx3}},
                  "📝 "+en.notes.substring(0,30))
              )
            ),
            e("div",{style:{textAlign:"right",flexShrink:0}},
              e("div",{style:{fontSize:13,fontWeight:700,color:C.nav}},
                "₦"+fmt(en.amount)),
              en.qty&&e("div",{style:{fontSize:9,color:C.tx3,marginTop:1}},
                `${en.qty} ${en.unit} @ ₦${fmt(en.rate||0)}`)
            )
          )
        ))
    ),

    // ─── SETTINGS TAB ────────────────────────────────────────────────────────
    tab==="settings"&&e("div",{style:{padding:"12px 16px 32px"}},

      e("div",{style:IS.card},
        e("div",{style:{fontSize:12,fontWeight:700,color:C.tx,marginBottom:10}},
          "Google Sheets Sync"),
        e("label",{style:IS.label},"Deployment URL"),
        e("input",{type:"url",value:url,placeholder:"https://script.google.com/…/exec",
          onChange:ev=>setUrl(ev.target.value),style:{...IS.input,marginBottom:8}}),
        e("button",{onClick:saveConfig,style:IS.btn(C.nav)},"Save URL"),
        url&&e("button",{onClick:retrySync,style:{
          ...IS.btn("transparent",C.nav2),border:`1px solid ${C.bdr}`,marginTop:8}},
          "Re-sync pending entries")
      ),

      e("div",{style:IS.card},
        e("div",{style:{display:"flex",alignItems:"center",
          justifyContent:"space-between",marginBottom:10}},
          e("div",{style:{fontSize:12,fontWeight:700,color:C.tx}},
            "Apps Script Code"),
          e("button",{onClick:()=>{
            try{navigator.clipboard.writeText(GS_SCRIPT);}catch(_){}
            setCopied(true);setTimeout(()=>setCopied(false),2000);
          },style:{background:copied?C.grn:C.bg,color:copied?"#fff":C.tx2,
            border:`1px solid ${copied?C.grn:C.bdr}`,padding:"4px 10px",
            borderRadius:4,fontSize:11,fontWeight:600,cursor:"pointer"}},
            copied?"Copied ✓":"Copy code")
        ),
        e("p",{style:{fontSize:11,color:C.tx2,marginBottom:8,lineHeight:1.5}},
          "1. Open your Google Sheet → Extensions → Apps Script",e("br"),
          "2. Replace existing code with the script below",e("br"),
          "3. Deploy → New Deployment → Web app (Execute as: Me, Access: Anyone)",e("br"),
          "4. Copy the URL above and paste it into the field above"
        ),
        e("pre",{style:{margin:0,fontSize:9,color:C.tx2,
          background:C.bg,padding:"10px",borderRadius:6,
          overflowX:"auto",lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word"}},
          GS_SCRIPT)
      ),

      e("div",{style:IS.card},
        e("div",{style:{fontSize:12,fontWeight:700,color:C.tx,marginBottom:6}},
          "Data Management"),
        e("div",{style:{fontSize:11,color:C.tx2,marginBottom:10}},
          entries.length+" entries stored locally ("+
          entries.filter(e=>e.status==="sent").length+" synced)"),
        e("button",{onClick:clearAll,style:{
          ...IS.btn(C.redl,C.red),border:`1px solid ${C.red}`}},
          "Clear all local entries")
      ),

      e("div",{style:{...IS.card,background:C.bg}},
        e("div",{style:{fontSize:10,color:C.tx3,textAlign:"center",lineHeight:1.6}},
          "Quality Cost Tracker v1.0",e("br"),
          "Makurai Ziko — Proposed Residential Development",e("br"),
          "Yenagoa LGA, Bayelsa State",e("br"),
          "BOQ Total Budget: ₦"+fmt(TOTAL_BUDGET),e("br"),
          "Prepared by PFTC Global Resources Limited")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
