// ── Storage abstraction (works in Claude.ai artifact AND as saved HTML) ────
const store={
  async get(k){
    try{if(window.storage){const r=await window.storage.get(k);return r;}
        const v=localStorage.getItem(k);return v?{value:v}:null;}catch{return null;}
  },
  async set(k,v){
    try{if(window.storage){return await window.storage.set(k,v);}
        localStorage.setItem(k,v);return{value:v};}catch{return null;}
  },
  async del(k){
    try{if(window.storage){return await window.storage.delete(k);}
        localStorage.removeItem(k);return{deleted:true};}catch{return null;}
  }
};

// ── Apps Script (multi-site, writes to COST LOG + WEEKLY TRACKER) ──────────
const GS_SCRIPT=`// Sunville Developers — Cost & Wage Bill Tracker
// This script handles BOTH wage bill entries and QS cost entries
// It writes to three sheets:
//   1. COST LOG       — every individual line item
//   2. WAGE BILLS     — complete wage bill summaries
//   3. WEEKLY TRACKER — aggregated by site+week, mirrors your tracker format
//
// Deploy as: Extensions → Apps Script → Deploy → New Deployment
// Type: Web app | Execute: Me | Access: Anyone

function doPost(e) {
  try {
    var d = JSON.parse(e.postData.contents);
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    var ts = new Date().toISOString();
    if (d.entryType === "wage_bill") {
      writeWageBill(ss, d, ts);
    } else {
      writeCostEntry(ss, d, ts);
    }
    updateWeeklyTracker(ss, d, ts);
    SpreadsheetApp.flush();
    return ContentService.createTextOutput(JSON.stringify({ok:true}))
                         .setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService.createTextOutput(JSON.stringify({ok:false,error:err.message}))
                         .setMimeType(ContentService.MimeType.JSON);
  }
}

function ensureSheet(ss, name, headers, widths) {
  var sh = ss.getSheetByName(name);
  if (!sh) {
    sh = ss.insertSheet(name);
    sh.appendRow(headers);
    sh.getRange(1,1,1,headers.length).setBackground("#1F6E43").setFontColor("white").setFontWeight("bold");
    sh.setFrozenRows(1);
    if (widths) sh.setColumnWidths(1, widths.length, widths);
  }
  return sh;
}

function writeWageBill(ss, d, ts) {
  var wbHeaders = ["Timestamp","Site","Bill Date","Week Ref","Supervisor",
    "S/N","Element","BOQ Item Ref","BOQ Item Description",
    "Cost Type","Work Description","Designation","Workers","Rate (N)","Amount (N)",
    "Transfer?","Transfer From","Bill Notes","Submitted At","Status"];
  var wbWidths = [140,120,90,90,130,40,130,80,260,90,220,100,70,90,110,70,120,180,140,90];
  var wb = ensureSheet(ss,"WAGE BILLS",wbHeaders,wbWidths);
  d.items.forEach(function(item,i){
    wb.appendRow([
      ts, d.site, d.date, d.weekRef, d.supervisor,
      i+1,
      item.elemLabel||"", item.itemRef||"", item.itemDesc||"",
      item.costType||"Labour", item.workDesc||"",
      item.desig||"Labour", Number(item.workers)||"",
      Number(item.rate)||"", Number(item.amount)||0,
      item.isTransfer?"YES":"", item.transferFrom||"",
      i===0?(d.notes||""):"", d.at||ts, "PENDING"
    ]);
  });
}

function writeCostEntry(ss, d, ts) {
  var ceHeaders = ["Timestamp","Site","Date","Week Ref",
    "Element Code","Element","BOQ Item Ref","BOQ Item Description",
    "Cost Type","Work Description","Qty","Unit","Rate (N)","Amount (N)",
    "Recorded By","Notes","Submitted At","Status"];
  var ceWidths = [140,120,90,90,80,130,80,280,90,240,60,60,100,110,130,200,140,90];
  var cl = ensureSheet(ss,"COST LOG",ceHeaders,ceWidths);
  cl.appendRow([
    ts, d.site, d.date, d.weekRef,
    d.elemCode||"", d.elemLabel||"", d.itemRef||"", d.itemDesc||"",
    d.costType||"", d.workDesc||"",
    Number(d.qty)||"", d.unit||"", Number(d.rate)||"", Number(d.amount)||0,
    d.recordedBy||"", d.notes||"", d.at||ts, "PENDING"
  ]);
}

function updateWeeklyTracker(ss, d, ts) {
  // WEEKLY TRACKER mirrors the existing tracker format:
  // Site | Week Ref | Week Start | Materials | Labour | Other | Gross | Entries | Last Updated
  var wtHeaders = ["Site","Week Ref","Week Start","Materials (N)","Labour (N)","Other (N)","Gross Total (N)","Entry Count","Last Updated"];
  var wt = ensureSheet(ss,"WEEKLY TRACKER",wtHeaders,[140,90,90,120,120,120,130,80,140]);

  var site = d.site;
  var weekRef = d.weekRef;
  var mat = 0, lab = 0, other = 0;

  if (d.entryType === "wage_bill") {
    mat   = Number(d.totalMaterials)||0;
    lab   = Number(d.totalLabour)||0;
    other = Number(d.totalOther)||0;
  } else {
    var amt = Number(d.amount)||0;
    if (d.costType==="Materials") mat=amt;
    else if (d.costType==="Labour") lab=amt;
    else other=amt;
  }

  // Find existing row for this site+week
  var data = wt.getDataRange().getValues();
  var rowIdx = -1;
  for (var i=1;i<data.length;i++){
    if (data[i][0]===site && data[i][1]===weekRef){ rowIdx=i+1; break; }
  }
  if (rowIdx===-1) {
    // New row
    var weekStart = d.date||"";
    wt.appendRow([site,weekRef,weekStart,mat,lab,other,mat+lab+other,1,ts]);
  } else {
    // Update existing row
    var r = wt.getRange(rowIdx,1,1,9).getValues()[0];
    var newMat   = (Number(r[3])||0)+mat;
    var newLab   = (Number(r[4])||0)+lab;
    var newOther = (Number(r[5])||0)+other;
    var newCnt   = (Number(r[7])||0)+1;
    wt.getRange(rowIdx,4,1,6).setValues([[newMat,newLab,newOther,newMat+newLab+newOther,newCnt,ts]]);
  }
}

function doGet() {
  return ContentService.createTextOutput(JSON.stringify({status:"Sunville Cost Tracker API active — v2.0"}))
                       .setMimeType(ContentService.MimeType.JSON);
}`;

function getWeekRef(dateStr){
  if(!dateStr)return"";
  const d=new Date(dateStr+"T00:00:00");
  const day=d.getDay();
  const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const f=dd=>`${dd.getDate().toString().padStart(2,"0")}/${(dd.getMonth()+1).toString().padStart(2,"0")}`;
  return`W${f(mon)}–${f(sun)}`;
}

  const spendMap=useMemo(()=>{
    const map={};
    entries.forEach(en=>{
      const s=en.site;if(!s)return;
      if(!map[s])map[s]={};
      const items=en.entryType==="wage_bill"?en.items:[en];
      items.forEach(item=>{
        const k=item.elemKey;if(!k)return;
        if(!map[s][k])map[s][k]={total:0,items:{}};
        const a=Number(item.amount)||0;
        map[s][k].total+=a;
        const r=item.itemRef||"?";
        map[s][k].items[r]=(map[s][k].items[r]||0)+a;
      });
    });
    return map;
  },[entries]);

  const weekRows=useMemo(()=>{
    const map={};
    entries.filter(en=>!site||en.site===site).forEach(en=>{
      const w=en.weekRef;if(!w)return;
      if(!map[w])map[w]={week:w,mat:0,lab:0,other:0,gross:0};
      if(en.entryType==="wage_bill"){
        map[w].lab+=Number(en.totalLabour)||0;
        map[w].mat+=Number(en.totalMaterials)||0;
        map[w].other+=Number(en.totalOther)||0;
      }else{
        const a=Number(en.amount)||0;
        if(en.costType==="Labour")map[w].lab+=a;
        else if(en.costType==="Materials")map[w].mat+=a;
        else map[w].other+=a;
      }
      map[w].gross=map[w].mat+map[w].lab+map[w].other;
    });
    return Object.values(map).sort((a,b)=>b.week.localeCompare(a.week));
  },[entries,site]);

  const siteTotalSpent=useMemo(()=>{
    const sm=spendMap[site]||{};
    return Object.values(sm).reduce((s,el)=>s+(el.total||0),0);
  },[spendMap,site]);

  const getSiteBudget=s=>{
    const sb=budgets[s]||{};
    return Object.values(sb).reduce((s,v)=>s+(Number(v)||0),0);
  };

  const wbTotal=wItems.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const wbTotalLab=wItems.filter(i=>i.costType==="Labour").reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const wbTotalMat=wItems.filter(i=>i.costType==="Materials").reduce((s,i)=>s+(parseFloat(i.amount)||0),0);

  // ── Handlers ─────────────────────────────────────────────────────────────
  const updWbItem=(id,field,val)=>{
    setWItems(prev=>prev.map(item=>{
      if(item.id!==id)return item;
      const u={...item,[field]:val};
      if(field==="elemKey"){u.itemRef="";u.itemDesc="";}
      if(field==="itemRef")u.itemDesc=ELEMENTS[item.elemKey]?.items.find(i=>i.ref===val)?.desc||"";
      if(field==="workers"||field==="rate"){
        const w=parseFloat(field==="workers"?val:item.workers)||0;
        const r=parseFloat(field==="rate"?val:item.rate)||0;
        u.amount=w&&r?String(Math.round(w*r)):u.amount;
      }
      return u;
    }));
  };
  const handleElemChange=v=>{setElemKey(v);setItemRef("");setUnit("");setRate("");setAmount("");};
  const handleItemChange=v=>{
    setItemRef(v);

    if(it)setUnit(it.unit||"");
    setAmount("");setQty("");
  };
  const handleQtyRate=(field,val)=>{
    if(field==="qty")setQty(val);if(field==="rate")setRate(val);
    const q=parseFloat(field==="qty"?val:qty)||0;
    const r=parseFloat(field==="rate"?val:rate)||0;
    if(q&&r)setAmount(String(Math.round(q*r)));else if(!q&&!r)setAmount("");

  // ── Submit Wage Bill ──────────────────────────────────────────────────────
  const submitWageBill=async()=>{
    if(!site)return showToast("Select a site first",true);
    if(!wDate||!wSuper.trim())return showToast("Fill in date and supervisor name",true);
    if(wItems.some(i=>!i.workDesc.trim()))return showToast("All work descriptions are required",true);
    if(wItems.some(i=>!i.amount||isNaN(Number(i.amount))))return showToast("Enter valid amounts for all items",true);
    setBusy(true);
    const tLab=wItems.filter(i=>i.costType==="Labour").reduce((s,i)=>s+(Number(i.amount)||0),0);
    const tMat=wItems.filter(i=>i.costType==="Materials").reduce((s,i)=>s+(Number(i.amount)||0),0);
    const tOther=wItems.filter(i=>i.costType==="Other").reduce((s,i)=>s+(Number(i.amount)||0),0);
    const entry={
      id:uid(),entryType:"wage_bill",site,date:wDate,weekRef:getWeekRef(wDate),
      supervisor:wSuper,
      items:wItems.map(({id,...r})=>({...r,amount:Number(r.amount)||0})),
      total:tLab+tMat+tOther,totalLabour:tLab,totalMaterials:tMat,totalOther:tOther,
      notes:wNotes,at:new Date().toISOString(),status:"local"
    };
    if(url){try{await fetch(url,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(entry)});entry.status="sent";}catch(_){}}
    const next=[entry,...entries];setEntries(next);
    try{await store.set("sct_entries",JSON.stringify(next));}catch(_){}
    setBusy(false);
    showToast(entry.status==="sent"?"Wage bill submitted & synced ✓":"Wage bill saved — configure Sheets URL to auto-sync");
    setWItems([mkWbItem()]);setWNotes("");
  };

  // ── Submit Cost Entry ─────────────────────────────────────────────────────

    if(!workDesc.trim())return showToast("Describe the actual work carried out",true);
    if(!amount||isNaN(Number(amount)))return showToast("Enter a valid amount",true);
    if(!cRecBy.trim())return showToast("Enter who is recording this entry",true);

    const entry={
      id:uid(),entryType:"cost_entry",site,date:cDate,weekRef:getWeekRef(cDate),
      elemKey,elemCode:el.code,elemLabel:el.label,
      itemRef,itemDesc:it?.desc||"",
      costType,workDesc,qty:qty||"",unit,rate:rate||"",
      amount:Number(amount)||0,recordedBy:cRecBy,notes:cNotes,
      at:new Date().toISOString(),status:"local"
    };
    if(url){try{await fetch(url,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(entry)});entry.status="sent";}catch(_){}}
    const next=[entry,...entries];setEntries(next);
    try{await store.set("sct_entries",JSON.stringify(next));}catch(_){}
    setBusy(false);

    setItemRef("");setWorkDesc("");setQty("");setUnit("");setRate("");setAmount("");setCNotes("");
  };

      if(en.status==="sent")return en;
      try{await fetch(url,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(en)});sent++;return{...en,status:"sent"};}
      catch{return en;}
    }));
    setEntries(updated);
    try{await store.set("sct_entries",JSON.stringify(updated));}catch(_){}

          e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:10}},

              e("div",{style:{fontSize:11,fontWeight:600,color:C.tx,marginBottom:3}},en.workDesc),
              e("div",{style:{fontSize:10,color:C.tx2}},`${en.elemLabel} → ${en.itemRef} | ${en.itemDesc?.substring(0,60)}`),

        e("div",{style:{fontSize:28,marginBottom:8}},"🗂"),

          e("strong",null,"WAGE BILLS")," — all supervisor wage bill submissions",e("br"),
          e("strong",null,"COST LOG")," — all QS cost entries",e("br"),
          e("strong",null,"WEEKLY TRACKER")," — aggregated by site & week (mirrors your tracker format)"
        ),
        e("label",{style:IS.label},"Apps Script Deployment URL"),
        e("input",{type:"url",value:url,placeholder:"https://script.google.com/macros/s/…/exec",
          onChange:ev=>setUrl(ev.target.value),style:{...IS.input,marginBottom:8}}),
        e("button",{onClick:saveConfig,style:IS.btn(C.nav)},"Save URL"),
        url&&e("button",{onClick:retrySync,style:{...IS.btn("transparent",C.nav),

        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}},
          e("div",null,
            e("label",{style:IS.label},"Site"),
            e("select",{value:budgetSite,onChange:ev=>setBudgetSite(ev.target.value),

              e("option",{value:""},"— Site —"),
              SITES.map(s=>e("option",{key:s,value:s},s))

          ),
          e("div",null,
            e("label",{style:IS.label},"Work Element"),
            e("select",{value:budgetElem,onChange:ev=>setBudgetElem(ev.target.value),
              style:{...IS.input,appearance:"none"}},
              e("option",{value:""},"— Element —"),
              ELEM_KEYS.map(k=>e("option",{key:k,value:k},`${ELEMENTS[k].code} — ${ELEMENTS[k].label}`))
            )
          )
        ),
        e("label",{style:IS.label},"Budget Amount (₦)"),
        e("input",{type:"number",value:budgetAmt,placeholder:"Enter budget for this site/element",
          onChange:ev=>setBudgetAmt(ev.target.value),style:{...IS.input,marginBottom:8}}),
        e("button",{onClick:saveBudget,style:IS.btn(C.nav)},"Save Budget"),

        // Show configured budgets
        Object.keys(budgets).length>0&&e("div",{style:{marginTop:12,fontSize:11,color:C.tx2,fontWeight:600,marginBottom:6}},"Configured Budgets:"),
        ...Object.entries(budgets).map(([s,elems])=>
          Object.entries(elems).map(([ek,bv])=>
            e("div",{key:s+ek,style:{display:"flex",justifyContent:"space-between",
              padding:"4px 8px",background:C.bg,borderRadius:4,marginBottom:3}},
              e("span",{style:{fontSize:10,color:C.tx2}},s+" / "+ELEMENTS[ek]?.label),
              e("span",{style:{fontSize:10,fontWeight:600,color:C.nav}},"₦"+fmt(bv))
            )
          )
        ).flat()
      ),

      // Apps Script code
      e("div",{style:IS.card},
        e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},
          e("div",{style:{fontSize:12,fontWeight:700,color:C.tx}},"Apps Script Code"),
          e("button",{onClick:()=>{
            try{navigator.clipboard.writeText(GS_SCRIPT);}catch(_){}
            setCopied(true);setTimeout(()=>setCopied(false),2000);
          },style:{background:copied?C.grn:C.bg,color:copied?"#fff":C.tx2,
            border:`1px solid ${copied?C.grn:C.bdr}`,padding:"4px 10px",
            borderRadius:4,fontSize:11,fontWeight:600,cursor:"pointer"}},
            copied?"Copied ✓":"Copy code")
        ),
        e("p",{style:{fontSize:11,color:C.tx2,marginBottom:8,lineHeight:1.5}},
          "1. Open your Google Sheet → Extensions → Apps Script",e("br"),
          "2. Replace existing code with the script below",e("br"),
          "3. Deploy → New Deployment → Web app (Execute: Me | Access: Anyone)",e("br"),
          "4. Copy the URL and paste it in the field above → Save"
        ),
        e("pre",{style:{margin:0,fontSize:9,color:C.tx2,background:C.bg,
          padding:"10px",borderRadius:6,overflowX:"auto",lineHeight:1.6,
          whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:320,overflowY:"auto"}},
          GS_SCRIPT)
      ),

      // Data management
      e("div",{style:IS.card},
        e("div",{style:{fontSize:12,fontWeight:700,color:C.tx,marginBottom:6}},"Data"),
        e("div",{style:{fontSize:11,color:C.tx2,marginBottom:10}},
          entries.length+" entries stored · "+entries.filter(en=>en.status==="sent").length+" synced to Sheets"),
        e("button",{onClick:clearAll,style:{...IS.btn(C.redl,C.red),border:`1px solid ${C.red}`}},
          "Clear all local entries")
      ),

      e("div",{style:{...IS.card,background:C.bg,border:"none"}},
        e("div",{style:{fontSize:10,color:C.tx3,textAlign:"center",lineHeight:1.8}},
          "Sunville Developers — Cost & Wage Bill Tracker v2.0",e("br"),
          "24 Active Sites · Generic BOQ Framework · Multi-mode Entry",e("br"),
          "Prepared by PFTC Global Resources Limited")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
