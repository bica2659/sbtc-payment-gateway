*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#1F6E43;--g2:#155232;--gl:#E8F5E9;--g3:#DCFCE7;
  --nav:#1A2E4A;--nav2:#0F1E32;--navl:rgba(26,46,74,.08);
  --gold:#C9963B;--goldl:#FEF3C7;
  --bg:#F2F5FA;--card:#fff;--bdr:#DDE3ED;
  --tx:#1E293B;--tx2:#64748B;--tx3:#94A3B8;
  --red:#DC2626;--redl:#FEE2E2;
  --amb:#B45309;--ambl:#FEF9EF;
  --sky:#0369A1;--skyl:#E0F2FE;
  --pur:#7C3AED;--purl:#F5F3FF;
  --r:10px;--r2:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  background:var(--bg);color:var(--tx);font-size:13px;min-height:100vh}
select,input,textarea{font-family:inherit;font-size:13px;color:var(--tx)}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--bdr);overflow:hidden}
.inp{width:100%;padding:9px 11px;border:1.5px solid var(--bdr);border-radius:var(--r2);
  font-size:13px;background:var(--card);color:var(--tx);outline:none}
.inp:focus{border-color:var(--g)}
.sel{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2364748B' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 10px center;padding-right:28px}
.lbl{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:4px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;
  border-radius:var(--r2);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s;width:100%}
.btn:active{opacity:.8}
.btn-g{background:var(--g);color:#fff}
.btn-nav{background:var(--nav);color:#fff}
.btn-sec{background:var(--gl);color:var(--g);border:1px solid var(--g)}
.btn-ghost{background:transparent;color:var(--tx2);border:1px solid var(--bdr)}
.btn-sm{padding:5px 10px;font-size:11px;font-weight:600;border-radius:4px;cursor:pointer;border:none}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-g{background:var(--gl);color:var(--g2)}
.badge-amb{background:var(--ambl);color:var(--amb)}
.badge-red{background:var(--redl);color:var(--red)}
.badge-sky{background:var(--skyl);color:var(--sky)}
.badge-nav{background:var(--navl);color:var(--nav)}
.badge-pur{background:var(--purl);color:var(--pur)}
.badge-gold{background:var(--goldl);color:var(--gold)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.row{display:flex;gap:8px;align-items:center}
.col{flex:1;min-width:0}
.pg{padding:12px 16px 32px}
.sec{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.1em;
  display:flex;align-items:center;gap:8px;margin:14px 0 8px}
.sec::after{content:'';flex:1;height:1px;background:var(--bdr)}
.hdr{padding:12px 16px 10px}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--bdr);overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 14px;font-size:12px;font-weight:600;background:none;border:none;
  border-bottom:2px solid transparent;color:var(--tx2);cursor:pointer;white-space:nowrap}
.tab.on{color:var(--g);border-bottom-color:var(--g)}
.stat-row{display:flex;gap:8px;margin-bottom:12px}
.stat{background:var(--card);border-radius:var(--r);border:1px solid var(--bdr);padding:12px;flex:1;min-width:0}
.stat-n{font-size:20px;font-weight:700;color:var(--g)}
.stat-l{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-top:2px}
.bar-t{height:5px;background:var(--bdr);border-radius:3px;overflow:hidden;margin-top:6px}
.bar-f{height:100%;border-radius:3px;transition:width .3s}
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);
  padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;
  white-space:nowrap;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.empty{text-align:center;padding:40px 16px;color:var(--tx2)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;
  font-size:11px;font-weight:600;background:var(--bg);color:var(--tx2);border:1px solid var(--bdr)}
</style>

// ── FACILITY MODULE ───────────────────────────────────────────────────────
function FacilityModule({onBack}){
  const [tab,setTab]=useState('jobs');
  const [expandedJob,setExpandedJob]=useState(null);
  const [newJobProp,setNewJobProp]=useState('');
  const [newJobCat,setNewJobCat]=useState('');
  const [newJobDesc,setNewJobDesc]=useState('');
  const [newJobPri,setNewJobPri]=useState('Routine');
  const [newJobCn,setNewJobCn]=useState('');
  const [jobs,setJobs]=useState(JOBS);
  const [toast,setToast]=useState(null);
  const [showAdd,setShowAdd]=useState(false);

  const showT=(msg,err=false)=>{setToast({msg,err});setTimeout(()=>setToast(null),2800)};

  const openJobs=jobs.filter(j=>j.status!=='Completed');
  const emergent=jobs.filter(j=>j.priority==='Emergency'&&j.status!=='Completed');

  const clientOf=cid=>CLIENTS.find(c=>c.id===cid);
  const propOf=pid=>PROPERTIES.find(p=>p.id===pid);
  const cnOf=cnid=>CONTRACTORS.find(c=>c.id===cnid);

  const addJob=()=>{
    if(!newJobProp||!newJobCat||!newJobDesc.trim())return showT('Fill property, category and description',true);
    const j={id:'J'+Date.now(),propId:newJobProp,clientId:propOf(newJobProp)?.clientId||null,
      cat:newJobCat,priority:newJobPri,desc:newJobDesc,cnId:newJobCn||null,
      status:newJobCn?'Scheduled':'Pending Assignment',raised:today(),cost:null};

          h('div',{key:s.l,className:'stat'},

          background:'var(--g)'

              h('span',{className:'badge '+(inv.status==='Paid'?'badge-g':'badge-red')},

              inv.paid&&h('div',{style:{fontSize:10,color:'var(--tx3)',marginTop:4}},'Paid: '+inv.paid)

         ['Duplex','₦350,000 / year']].map(([t,r])=>

// ── SALES MODULE ──────────────────────────────────────────────────────────
function SalesModule({onBack}){
  const [tab,setTab]=useState('listings');
  const [expandedPP,setExpandedPP]=useState(null);
  const [expandedProp,setExpandedProp]=useState(null);
  const [filterZone,setFilterZone]=useState('');
  const [filterStatus,setFilterStatus]=useState('');

  const clientOf=cid=>CLIENTS.find(c=>c.id===cid);
  const propOf=pid=>PROPERTIES.find(p=>p.id===pid);
  const ppOf=pid=>PAY_PLANS.find(pp=>pp.propId===pid);

  const filteredProps=PROPERTIES.filter(p=>
    (!filterZone||p.zone===filterZone)&&(!filterStatus||p.status===filterStatus)
  );

  const totalSalesValue=PROPERTIES.filter(p=>['Occupied','Reserved'].includes(p.status))
    .reduce((s,p)=>s+p.listPrice,0);
  const availableValue=PROPERTIES.filter(p=>p.status==='Available')
    .reduce((s,p)=>s+p.listPrice,0);

  // Sell vs shelve calculator
  const calcMargin=(p)=>{
    if(!p.buildCost)return null;
    const facilityReserve=p.sc*10; // 10 year reserve
    const cost=p.buildCost+facilityReserve;
    const margin=p.listPrice-cost;
    const marginPct=Math.round(margin/p.buildCost*100);
    return{cost,margin,marginPct};
  };

  return h('div',{style:{background:'var(--bg)',minHeight:'100vh'}},
    h('div',{className:'hdr',style:{background:'var(--nav)'}},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
        h('div',null,
          h('div',{style:{fontSize:16,fontWeight:700,color:'#fff'}},'🏠 Sales & Listings'),
          h('div',{style:{fontSize:11,color:'rgba(255,255,255,.6)'}},'Properties · Buyers · Payment Plans')
        ),
        h('button',{style:{background:'rgba(255,255,255,.15)',color:'#fff',padding:'5px 12px',
          borderRadius:20,fontSize:11,fontWeight:600,cursor:'pointer',border:'none'},onClick:onBack},'← Back')
      ),
      h('div',{style:{display:'flex',gap:8,marginTop:10}},
        [{v:'₦'+fmtM(totalSalesValue),l:'Sold/Reserved'},{v:'₦'+fmtM(availableValue),l:'Available'},{v:LEADS.length,l:'Active Leads'}].map(s=>
          h('div',{key:s.l,style:{background:'rgba(255,255,255,.1)',borderRadius:6,padding:'6px 12px',textAlign:'center'}},
            h('div',{style:{fontSize:14,fontWeight:700,color:'var(--gold)'}},s.v),
            h('div',{style:{fontSize:9,color:'rgba(255,255,255,.5)',textTransform:'uppercase',letterSpacing:'.08em'}},s.l)
          )
        )
      )
    ),
    h('div',{className:'tabs'},
      [['listings','🏘 Listings'],['pipeline','📊 Pipeline'],['buyers','💳 Buyers'],['pricing','💰 Pricing']].map(([t,l])=>
        h('button',{key:t,className:'tab '+(tab===t?'on':''),onClick:()=>setTab(t)},l)
      )
    ),

    // ── LISTINGS ───────────────────────────────────────────────────────────
    tab==='listings'&&h('div',{className:'pg'},
      h('div',{className:'g2',style:{marginBottom:10}},
        h('select',{className:'inp sel',value:filterZone,onChange:e=>setFilterZone(e.target.value)},
          h('option',{value:''},'All zones'),
          ['GRA','Odili Road'].map(z=>h('option',{key:z,value:z},z))
        ),
        h('select',{className:'inp sel',value:filterStatus,onChange:e=>setFilterStatus(e.target.value)},
          h('option',{value:''},'All statuses'),
          ['Available','Occupied','Reserved','Under Construction'].map(s=>h('option',{key:s,value:s},s))
        )
      ),
      filteredProps.map(p=>{
        const pp=ppOf(p.id);
        const isExp=expandedProp===p.id;
        const margin=calcMargin(p);
        return h('div',{key:p.id,className:'card',style:{marginBottom:10,overflow:'hidden'}},
          // 3D Tour Banner for completed properties
          p.status!=='Under Construction'&&h('div',{
            style:{background:'linear-gradient(135deg,var(--nav) 0%,#2D4A6E 100%)',
              padding:'16px 16px 12px',cursor:'pointer',position:'relative',overflow:'hidden'},
            onClick:()=>setExpandedProp(isExp?null:p.id)},
            h('div',{style:{position:'absolute',right:12,top:12,opacity:.12,fontSize:60}},
              p.type.includes('Duplex')?'🏠':'🏢'),
            h('div',{style:{position:'relative'}},
              h('div',{style:{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}},
                h('span',{className:'badge '+propStatusBadge(p.status)},p.status),
                h('span',{className:'badge badge-nav'},p.zone),
                h('span',{className:'badge',style:{background:'rgba(201,150,59,.2)',color:'var(--gold)'}},
                  '🎬 3D Tour Available')
              ),
              h('div',{style:{fontSize:15,fontWeight:700,color:'#fff',marginBottom:2}},p.estate),
              h('div',{style:{fontSize:12,color:'rgba(255,255,255,.6)'}},
                `${p.block} · ${p.unit} · ${p.type} · ${p.sqm}sqm`)
            )
          ),
          // Under construction view
          p.status==='Under Construction'&&h('div',{
            style:{background:'linear-gradient(135deg,var(--amb) 0%,#92400E 100%)',
              padding:'14px 16px',cursor:'pointer'},
            onClick:()=>setExpandedProp(isExp?null:p.id)},
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
              h('div',null,
                h('div',{style:{display:'flex',gap:6,marginBottom:6}},
                  h('span',{className:'badge badge-amb'},p.status),
                  h('span',{className:'badge badge-nav'},p.zone)
                ),
                h('div',{style:{fontSize:14,fontWeight:700,color:'#fff'}},p.estate),
                h('div',{style:{fontSize:11,color:'rgba(255,255,255,.6)'}},
                  `${p.block} · ${p.unit} · ${p.type}`)
              ),
              h('div',{style:{textAlign:'right'}},
                h('div',{style:{fontSize:22,fontWeight:800,color:'#fff'}},p.pct+'%'),
                h('div',{style:{fontSize:10,color:'rgba(255,255,255,.5)'}},p.eta)
              )
            ),
            h('div',{style:{height:5,background:'rgba(255,255,255,.2)',borderRadius:3,overflow:'hidden'}},
              h('div',{style:{height:'100%',width:p.pct+'%',background:'#fff',borderRadius:3}})
            )
          ),
          // Price and details row
          h('div',{style:{padding:'12px 14px'}},
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:isExp?10:0}},
              h('div',null,
                h('div',{style:{fontSize:16,fontWeight:700,color:'var(--nav)'}},
                  '₦'+fmtM(p.listPrice)),
                h('div',{style:{fontSize:11,color:'var(--tx2)'}},
                  'SC: ₦'+fmtN(p.sc)+'/yr')
              ),
              margin&&h('div',{style:{textAlign:'right'}},
                h('div',{style:{fontSize:13,fontWeight:700,
                  color:margin.marginPct>50?'var(--g)':margin.marginPct>20?'var(--amb)':'var(--red)'}},
                  '+'+margin.marginPct+'% margin'),
                h('div',{style:{fontSize:10,color:'var(--tx3)'}},
                  '₦'+fmtM(margin.margin)+' gross')
              )
            ),
            isExp&&h('div',null,
              h('div',{style:{background:'var(--bg)',borderRadius:8,padding:'12px',marginBottom:8}},
                h('div',{style:{fontSize:11,fontWeight:700,color:'var(--tx2)',marginBottom:8}},'Property Details'),
                h('div',{className:'g2'},
                  [{l:'Type',v:p.type},{l:'Zone',v:p.zone},{l:'Floor',v:`Floor ${p.floor}`},{l:'Size',v:`${p.sqm} sqm`}].map(d=>
                    h('div',{key:d.l,style:{background:'var(--card)',borderRadius:5,padding:'6px 8px'}},
                      h('div',{style:{fontSize:10,color:'var(--tx3)'}},d.l),
                      h('div',{style:{fontSize:12,fontWeight:600}},d.v)
                    )
                  )
                )
              ),
              p.status==='Available'&&h('button',{className:'btn btn-nav',style:{marginBottom:8}},
                '📞 Register Buyer Interest'),
              p.status!=='Under Construction'&&h('div',{
                style:{background:'linear-gradient(135deg,var(--nav) 0%,#2D4A6E 100%)',
                  borderRadius:8,padding:'14px',textAlign:'center',cursor:'pointer'}},
                h('div',{style:{fontSize:20,marginBottom:6}},'🎬'),
                h('div',{style:{fontSize:13,fontWeight:700,color:'#fff',marginBottom:2}},
                  '3D Virtual Tour'),
                h('div',{style:{fontSize:11,color:'rgba(255,255,255,.5)'}},
                  'Interactive floor plan walkthrough — coming in V2')
              )
            )
          )
        );
      })
    ),

    // ── PIPELINE ───────────────────────────────────────────────────────────
    tab==='pipeline'&&h('div',{className:'pg'},
      h('div',{className:'sec'},'Active Leads'),
      LEADS.map(l=>
        h('div',{key:l.id,className:'card',style:{padding:'12px 14px',marginBottom:8}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
            h('div',{style:{flex:1}},
              h('div',{style:{display:'flex',gap:6,marginBottom:4}},
                h('span',{className:
                  l.stage==='Negotiation'?'badge badge-g':
                  l.stage==='Viewing Scheduled'?'badge badge-amb':
                  'badge badge-sky'},l.stage)
              ),
              h('div',{style:{fontSize:13,fontWeight:600,marginBottom:2}},l.name),
              h('div',{style:{fontSize:11,color:'var(--tx2)',marginBottom:2}},
                l.interest+' · '+l.budget),
              h('div',{style:{fontSize:11,color:'var(--tx3)'}},l.note)
            ),
            h('div',{style:{textAlign:'right',flexShrink:0,marginLeft:8}},
              h('div',{style:{fontSize:11,color:'var(--tx3)'}},l.date),
              h('div',{style:{fontSize:11,fontWeight:600,color:'var(--g)',marginTop:4}},l.phone)
            )
          )
        )
      ),
      h('div',{className:'card',style:{padding:'14px',marginTop:4,background:'var(--navl)',border:'1px solid var(--bdr)'}},
        h('div',{style:{fontSize:11,fontWeight:700,color:'var(--nav)',marginBottom:4}},'Pipeline Summary'),
        [{s:'First Contact',n:LEADS.filter(l=>l.stage==='First Contact').length},
         {s:'Viewing Scheduled',n:LEADS.filter(l=>l.stage==='Viewing Scheduled').length},
         {s:'Negotiation',n:LEADS.filter(l=>l.stage==='Negotiation').length}].map(r=>
          h('div',{key:r.s,style:{display:'flex',justifyContent:'space-between',
            padding:'6px 0',borderBottom:'1px solid var(--bdr)'}},
            h('span',{style:{fontSize:12,color:'var(--tx2)'}},r.s),
            h('span',{style:{fontSize:12,fontWeight:700,color:'var(--nav)'}},r.n+' lead'+(r.n!==1?'s':''))
          )
        )
      )
    ),

    // ── BUYERS / PAYMENT PLANS ──────────────────────────────────────────
    tab==='buyers'&&h('div',{className:'pg'},
      PAY_PLANS.map(pp=>{
        const client=clientOf(pp.clientId);
        const prop=propOf(pp.propId);
        const paid=pp.items.filter(i=>i.paid).reduce((s,i)=>s+i.amount,0);
        const balance=pp.total-paid;
        const paidPct=Math.round(paid/pp.total*100);
        const isExp=expandedPP===pp.id;
        return h('div',{key:pp.id,className:'card',style:{marginBottom:12}},
          h('div',{style:{padding:'14px',cursor:'pointer'},onClick:()=>setExpandedPP(isExp?null:pp.id)},
            h('div',{style:{display:'flex',gap:6,marginBottom:8}},
              h('span',{className:'badge badge-pur'},pp.type),
              h('span',{className:'badge badge-nav'},prop?.zone||'')
            ),
            h('div',{style:{fontSize:14,fontWeight:700,marginBottom:2}},client?.name),
            h('div',{style:{fontSize:12,color:'var(--tx2)',marginBottom:8}},
              prop?`${prop.estate} · ${prop.unit}`:''),
            h('div',{className:'g2',style:{marginBottom:10}},
              h('div',null,
                h('div',{style:{fontSize:10,color:'var(--tx3)'}},  'Total Price'),
                h('div',{style:{fontSize:14,fontWeight:700,color:'var(--nav)'}},
                  '₦'+fmtM(pp.total))
              ),
              h('div',null,
                h('div',{style:{fontSize:10,color:'var(--tx3)'}},  'Outstanding'),
                h('div',{style:{fontSize:14,fontWeight:700,color:balance>0?'var(--amb)':'var(--g)'}},
                  '₦'+fmtM(balance))
              )
            ),
            h('div',{style:{height:6,background:'var(--bdr)',borderRadius:3,overflow:'hidden',marginBottom:6}},
              h('div',{style:{height:'100%',width:paidPct+'%',background:'var(--g)',borderRadius:3}})
            ),
            h('div',{style:{display:'flex',justifyContent:'space-between'}},
              h('span',{style:{fontSize:11,color:'var(--tx2)'}},paidPct+'% paid'),
              h('span',{style:{fontSize:11,color:'var(--tx3)'}},isExp?'▲ Close':'▼ View plan')
            )
          ),
          isExp&&h('div',{style:{borderTop:'1px solid var(--bdr)',padding:'12px 14px'}},
            h('div',{className:'sec'},'Payment Schedule'),
            pp.items.map((item,i)=>
              h('div',{key:i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',
                padding:'8px 10px',borderRadius:6,marginBottom:6,
                background:item.paid?'var(--gl)':item.due&&item.due<today()?'var(--redl)':'var(--bg)',
                border:`1px solid ${item.paid?'var(--g3)':item.due&&item.due<today()?'var(--redl)':'var(--bdr)'}`}},
                h('div',null,
                  h('div',{style:{fontSize:12,fontWeight:600,color:item.paid?'var(--g2)':'var(--tx)'}},
                    item.label),
                  h('div',{style:{fontSize:11,color:'var(--tx3)'}},
                    item.paid?'Paid: '+item.date:'Due: '+item.due)
                ),
                h('div',{style:{textAlign:'right'}},
                  h('div',{style:{fontSize:13,fontWeight:700,
                    color:item.paid?'var(--g)':'var(--tx)'}},
                    '₦'+fmtM(item.amount)),
                  h('span',{className:'badge '+(item.paid?'badge-g':'badge-amb')},
                    item.paid?'✓ Paid':'Pending')
                )
              )
            )
          )
        );
      })
    ),

    // ── PRICING / SELL OR SHELVE ────────────────────────────────────────
    tab==='pricing'&&h('div',{className:'pg'},
      h('div',{className:'card',style:{padding:'14px',marginBottom:12,
        background:'var(--navl)',border:'1px solid var(--bdr)'}},
        h('div',{style:{fontSize:12,fontWeight:700,color:'var(--nav)',marginBottom:4}},
          '💰 Sell vs Shelve Price Calculator'),
        h('div',{style:{fontSize:11,color:'var(--tx2)',lineHeight:1.7}},
          'Every completed unit\'s construction cost (from FieldLedger) + a 10-year service charge reserve '+
          'determines the minimum sell price. Margin above this is your gross profit per unit. '+
          'Units below 25% margin should be reviewed for repricing or shelving.')
      ),
      PROPERTIES.filter(p=>p.buildCost&&p.listPrice).map(p=>{
        const m=calcMargin(p);
        if(!m)return null;
        return h('div',{key:p.id,className:'card',style:{padding:'12px 14px',marginBottom:8}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}},
            h('div',null,
              h('div',{style:{fontSize:13,fontWeight:700,marginBottom:2}},
                p.estate+' · '+p.unit),
              h('div',{style:{fontSize:11,color:'var(--tx2)'}},p.type+' · '+p.zone)
            ),
            h('div',{style:{textAlign:'right'}},
              h('div',{style:{fontSize:16,fontWeight:800,
                color:m.marginPct>=50?'var(--g)':m.marginPct>=25?'var(--amb)':'var(--red)'}},
                '+'+m.marginPct+'%'),
              h('div',{style:{fontSize:10,color:'var(--tx3)'}},
                m.marginPct>=50?'Strong — Sell':m.marginPct>=25?'Acceptable':'Review Pricing')
            )
          ),
          h('div',{className:'g3',style:{gap:6}},
            [{l:'Build Cost',v:'₦'+fmtM(p.buildCost),c:'var(--tx)'},
             {l:'SC Reserve (10yr)',v:'₦'+fmtM(p.sc*10),c:'var(--amb)'},
             {l:'List Price',v:'₦'+fmtM(p.listPrice),c:'var(--nav)'}].map(d=>
              h('div',{key:d.l,style:{background:'var(--bg)',borderRadius:5,padding:'6px 8px'}},
                h('div',{style:{fontSize:10,color:'var(--tx3)'}},d.l),
                h('div',{style:{fontSize:12,fontWeight:700,color:d.c}},d.v)
              )
            )
          ),
          h('div',{style:{marginTop:8,padding:'7px 10px',borderRadius:5,
            background:m.marginPct>=50?'var(--gl)':m.marginPct>=25?'var(--ambl)':'var(--redl)'}},
            h('div',{style:{display:'flex',justifyContent:'space-between'}},
              h('span',{style:{fontSize:11,color:'var(--tx2)'}},
                'Gross profit after build + 10yr facility reserve'),
              h('span',{style:{fontSize:12,fontWeight:700,
                color:m.marginPct>=50?'var(--g)':m.marginPct>=25?'var(--amb)':'var(--red)'}},
                '₦'+fmtM(m.margin))
            )
          )
        );
      })
    )
  );
}

// ── MANAGEMENT DASHBOARD ─────────────────────────────────────────────────
function ManagementDashboard({onBack}){
  const scCollected=SC_INVOICES.filter(i=>i.status==='Paid').reduce((s,i)=>s+i.amt,0);
  const scTotal=SC_INVOICES.reduce((s,i)=>s+i.amt,0);
  const scRate=Math.round(scCollected/scTotal*100);
  const openJobs=JOBS.filter(j=>j.status!=='Completed').length;
  const urgentJobs=JOBS.filter(j=>j.priority==='Emergency'||j.priority==='Urgent').filter(j=>j.status!=='Completed').length;
  const availableProps=PROPERTIES.filter(p=>p.status==='Available').length;
  const activeLeads=LEADS.length;
  const totalBuildCost=PROPERTIES.filter(p=>p.buildCost).reduce((s,p)=>s+p.buildCost,0);

  return h('div',{style:{background:'var(--bg)',minHeight:'100vh'}},
    h('div',{style:{background:'linear-gradient(135deg,var(--nav) 0%,var(--nav2) 100%)',padding:'20px 16px 16px'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
        h('div',null,
          h('div',{style:{fontSize:16,fontWeight:700,color:'#fff'}},'📊 Management Dashboard'),
          h('div',{style:{fontSize:11,color:'rgba(255,255,255,.5)'}},today()+' · COO / MD View')
        ),
        h('button',{style:{background:'rgba(255,255,255,.15)',color:'#fff',padding:'5px 12px',
          borderRadius:20,fontSize:11,fontWeight:600,cursor:'pointer',border:'none'},onClick:onBack},'← Back')
      )
    ),
    h('div',{className:'pg'},
      h('div',{className:'sec'},'Construction — FieldLedger'),
      h('div',{className:'stat-row'},
        [{l:'Active Sites',v:'24'},{l:'Portfolio Spend',v:'₦226M+'},{l:'Week 4 Jun',v:'₦48.2M'}].map(s=>
          h('div',{key:s.l,className:'stat'},
            h('div',{className:'stat-n',style:{fontSize:16}},s.v),
            h('div',{className:'stat-l'},s.l)
          )
        )
      ),
      h('div',{className:'card',style:{padding:'10px 14px',marginBottom:16,background:'var(--ambl)',border:'1px solid var(--ambl)'}},
        h('div',{style:{fontSize:11,fontWeight:700,color:'var(--amb)',marginBottom:2}},'Sites under regulatory suspension'),
        h('div',{style:{fontSize:11,color:'var(--tx2)'}},
          'Tanzanite · Aquamarine · Alexandrite — pending clearance')
      ),

      h('div',{className:'sec'},'Facility Management'),
      h('div',{className:'g2',style:{gap:8,marginBottom:10}},
        h('div',{className:'stat'},
          h('div',{className:'stat-n'},openJobs),
          h('div',{className:'stat-l'},'Open Jobs'),
          urgentJobs>0&&h('div',{className:'badge badge-red',style:{marginTop:6}},
            urgentJobs+' urgent/emergency')
        ),
        h('div',{className:'stat'},
          h('div',{className:'stat-n'},scRate+'%'),
          h('div',{className:'stat-l'},'SC Collected'),
          h('div',{className:'bar-t'},
            h('div',{className:'bar-f',style:{width:scRate+'%',background:'var(--g)'}})
          )
        )
      ),
      h('div',{className:'g2',style:{gap:8,marginBottom:16}},
        h('div',{className:'stat'},
          h('div',{className:'stat-n'},'₦'+fmtM(scCollected)),
          h('div',{className:'stat-l'},'SC Received')
        ),
        h('div',{className:'stat'},
          h('div',{className:'stat-n',style:{color:'var(--red)'}},
            '₦'+fmtM(scTotal-scCollected)),
          h('div',{className:'stat-l'},'SC Outstanding')
        )
      ),

      h('div',{className:'sec'},'Sales Pipeline'),
      h('div',{className:'g2',style:{gap:8,marginBottom:10}},
        h('div',{className:'stat'},
          h('div',{className:'stat-n'},availableProps),
          h('div',{className:'stat-l'},'Available Units')
        ),
        h('div',{className:'stat'},
          h('div',{className:'stat-n'},activeLeads),
          h('div',{className:'stat-l'},'Active Leads')
        )
      ),
      h('div',{className:'g2',style:{gap:8,marginBottom:16}},
        h('div',{className:'stat'},
          h('div',{className:'stat-n'},'₦'+fmtM(PROPERTIES.filter(p=>p.status==='Available').reduce((s,p)=>s+p.listPrice,0))},
          h('div',{className:'stat-l'},'Available Value')
        ),
        h('div',{className:'stat'},
          h('div',{className:'stat-n'},'₦'+fmtM(PAY_PLANS.reduce((s,pp)=>s+pp.items.filter(i=>!i.paid).reduce((ss,i)=>ss+i.amount,0),0))},
          h('div',{className:'stat-l'},'Payments Due')
        )
      ),

      h('div',{className:'sec'},'Platform'),
      h('div',{className:'card',style:{padding:'14px',background:'var(--gl)',border:'1px solid var(--g)'}},
        h('div',{style:{fontSize:11,fontWeight:700,color:'var(--g2)',marginBottom:8}},
          'PFTC Platform Retainer · ₦200,000 / month'),
        [{l:'FieldLedger',s:'Wage bills + cost tracking',st:'Live — Onboarding supervisors'},
         {l:'Facility Management',s:'Maintenance + service charges',st:'Demo — Pending go-live'},
         {l:'Sales Module',s:'Listings + buyer pipeline',st:'Demo — Pending go-live'},
         {l:'Management Dashboard',s:'Cross-module executive view',st:'This screen'}].map(m=>
          h('div',{key:m.l,style:{display:'flex',justifyContent:'space-between',alignItems:'center',
            padding:'7px 0',borderBottom:'1px solid rgba(31,110,67,.15)'}},
            h('div',null,
              h('div',{style:{fontSize:12,fontWeight:600,color:'var(--nav)'}},m.l),
              h('div',{style:{fontSize:11,color:'var(--tx2)'}},m.s)
            ),
            h('span',{className:'badge '+(m.st.includes('Live')?'badge-g':m.st.includes('Demo')?'badge-amb':'badge-sky')},
              m.st)
          )
        )
      )
    )
  );
}

          z.sites.map(s=>h('span',{key:s,style:{display:'inline-block',fontSize:10,

// ── APP ROOT ──────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('landing');
  return h('div',{style:{maxWidth:480,margin:'0 auto'}},
    screen==='landing'&&h(PlatformLanding,{onModule:setScreen}),
    screen==='facility'&&h(FacilityModule,{onBack:()=>setScreen('landing')}),
    screen==='sales'&&h(SalesModule,{onBack:()=>setScreen('landing')}),
    screen==='construction'&&h(ConstructionModule,{onBack:()=>setScreen('landing')}),
    screen==='dashboard'&&h(ManagementDashboard,{onBack:()=>setScreen('landing')})
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
